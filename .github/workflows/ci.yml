name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" field —
      # specifying it here too makes action-setup@v4 fail on the mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      # Guards the client-bundle purity invariant: a server-only symbol
      # (node:fs / engine) leaking into the client barrel only fails at build.
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_STADIA_API_KEY: ci-placeholder

  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: tools/graph-pipeline/uv.lock

      - name: Pipeline tests
        working-directory: tools/graph-pipeline
        run: |
          uv sync
          uv run pytest -v
